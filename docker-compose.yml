---
services:
  data-server:
    build: .
    container_name: surf_data_server
    restart: unless-stopped
    ports:
      # Maps port 80 on the SURF VM to port 8000 in the container
      - "80:8000"
    volumes:
      # Maps the local 'data' folder to '/data' inside the container
      - ./data:/data
      - ./logs:/app/logs
    environment:
      # CHANGE THIS to a long, random string
      - API_KEY=${API_KEY}
      # The directory where data is stored inside the container
      - DATA_DIR=/data
      # Set to "true" to enable file uploads via the Web GUI
      - ALLOW_UPLOAD=${ALLOW_UPLOAD:-false}

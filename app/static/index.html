<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Data Hosting</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        input[type="text"], input[type="email"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
            margin: 1.5rem 0;
            font-size: 0.9rem;
            color: #555;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #2980b9;
        }
        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
        #fileList {
            margin-top: 2rem;
            border-top: 1px solid #eee;
            padding-top: 1rem;
            display: none;
        }
        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem;
            border-bottom: 1px solid #f0f0f0;
        }
        .file-item:last-child {
            border-bottom: none;
        }
        .download-btn {
            background-color: #2ecc71;
            padding: 0.5rem 1rem;
            text-decoration: none;
            color: white;
            border-radius: 4px;
            font-size: 0.9rem;
            width: auto;
        }
        .download-btn:hover {
            background-color: #27ae60;
        }
        .error {
            color: #e74c3c;
            text-align: center;
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Private Data Hosting</h1>
        
        <div id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="apiKey">API Key</label>
                <input type="text" id="apiKey" placeholder="Enter your API Key" required>
            </div>
            
            <div class="checkbox-group">
                <input type="checkbox" id="tos" required>
                <label for="tos">
                    I agree to the Terms of Service. I will use this data only for the hackathon/project and destroy it afterwards.
                </label>
            </div>
            
            <button id="loginBtn" onclick="login()">Access Files</button>
            <div id="loginError" class="error"></div>
        </div>

        <div id="fileList">
            <h3>Available Files</h3>
            <div id="filesContainer"></div>
            <button onclick="logout()" style="margin-top: 1.5rem; background-color: #95a5a6;">Logout</button>
        </div>
    </div>

    <script>
        async function login() {
            const email = document.getElementById('email').value;
            const apiKey = document.getElementById('apiKey').value;
            const tos = document.getElementById('tos').checked;
            const errorDiv = document.getElementById('loginError');
            const loginBtn = document.getElementById('loginBtn');

            if (!email || !apiKey) {
                showError('Please enter both email and API key.');
                return;
            }
            if (!tos) {
                showError('You must agree to the Terms of Service.');
                return;
            }

            errorDiv.style.display = 'none';
            loginBtn.disabled = true;
            loginBtn.textContent = 'Loading...';

            try {
                const response = await fetch('/list_files', {
                    headers: {
                        'x-api-key': apiKey
                    }
                });

                if (!response.ok) {
                    throw new Error('Invalid API Key or Server Error');
                }

                const data = await response.json();
                showFiles(data.files, email, apiKey);
                
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('fileList').style.display = 'block';
            } catch (err) {
                showError(err.message);
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Access Files';
            }
        }

        function showFiles(files, email, apiKey) {
            const container = document.getElementById('filesContainer');
            container.innerHTML = '';

            if (files.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#7f8c8d;">No files available.</p>';
                return;
            }

            files.forEach(file => {
                const div = document.createElement('div');
                div.className = 'file-item';
                
                const size = formatSize(file.size);
                const downloadUrl = `/download?filename=${encodeURIComponent(file.name)}&user_email=${encodeURIComponent(email)}&api_key=${encodeURIComponent(apiKey)}`;

                div.innerHTML = `
                    <div>
                        <strong>${file.name}</strong><br>
                        <small style="color:#7f8c8d">${size}</small>
                    </div>
                    <a href="${downloadUrl}" class="download-btn" target="_blank">Download</a>
                `;
                container.appendChild(div);
            });
        }

        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function showError(msg) {
            const el = document.getElementById('loginError');
            el.textContent = msg;
            el.style.display = 'block';
        }

        function logout() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('fileList').style.display = 'none';
            document.getElementById('apiKey').value = '';
            document.getElementById('tos').checked = false;
        }
    </script>
</body>
</html>

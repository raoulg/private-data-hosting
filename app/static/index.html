<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Data Hosting</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
        }

        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        input[type="text"],
        input[type="email"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
            margin: 1.5rem 0;
            font-size: 0.9rem;
            color: #555;
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #2980b9;
        }

        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }

        #fileList {
            margin-top: 2rem;
            border-top: 1px solid #eee;
            padding-top: 1rem;
            display: none;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem;
            border-bottom: 1px solid #f0f0f0;
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .download-btn {
            background-color: #2ecc71;
            padding: 0.5rem 1rem;
            text-decoration: none;
            color: white;
            border-radius: 4px;
            font-size: 0.9rem;
            width: auto;
        }

        .download-btn:hover {
            background-color: #27ae60;
        }

        .error {
            color: #e74c3c;
            text-align: center;
            margin-top: 1rem;
            display: none;
        }

        /* Tabs */
        .tabs {
            display: flex;
            margin-bottom: 1rem;
            border-bottom: 1px solid #ddd;
        }

        .tab-btn {
            padding: 0.75rem 1.5rem;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            color: #7f8c8d;
            font-weight: 500;
            width: auto;
        }

        .tab-btn.active {
            color: #3498db;
            border-bottom-color: #3498db;
        }

        .tab-btn:hover {
            background-color: #f9f9f9;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            background-color: #f0f0f0;
            border-radius: 4px;
            margin-top: 1rem;
            display: none;
        }

        .progress-bar {
            width: 0%;
            height: 20px;
            background-color: #2ecc71;
            border-radius: 4px;
            text-align: center;
            line-height: 20px;
            color: white;
            font-size: 0.8rem;
            transition: width 0.2s;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Private Data Hosting</h1>

        <div id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="apiKey">API Key</label>
                <input type="text" id="apiKey" placeholder="Enter your API Key" required>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="tos" required>
                <label for="tos">
                    I agree to the Terms of Service. I will use this data only for the hackathon/project and destroy it
                    afterwards.
                </label>
            </div>

            <button id="loginBtn" onclick="login()">Access Files</button>
            <div id="loginError" class="error"></div>
        </div>

        <div id="mainInterface" style="display:none;">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('browse')">Browse Files</button>
                <button class="tab-btn" id="uploadTabBtn" onclick="switchTab('upload')" style="display:none;">Upload
                    Files</button>
            </div>

            <div id="browseTab" class="tab-content active">
                <h3>Available Files</h3>
                <div style="margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <input type="checkbox" id="selectAll" onclick="toggleSelectAll()">
                        <label for="selectAll" style="display:inline; margin-left: 0.5rem;">Select All</label>
                    </div>
                    <button id="downloadSelectedBtn" onclick="downloadSelected()"
                        style="width: auto; padding: 0.5rem 1rem; background-color: #2ecc71;" disabled>Download
                        Selected</button>
                </div>
                <div id="filesContainer"></div>
            </div>

            <div id="uploadTab" class="tab-content">
                <h3>Upload Files</h3>
                <div class="form-group">
                    <label for="fileInput">Select Files</label>
                    <input type="file" id="fileInput" multiple>
                </div>
                <button id="uploadBtn" onclick="uploadFile()">Upload</button>
                <div id="progressContainer" class="progress-container">
                    <div id="progressBar" class="progress-bar">0%</div>
                </div>
                <div id="uploadStatus" style="margin-top: 1rem; text-align: center;"></div>
            </div>

            <button onclick="logout()" style="margin-top: 1.5rem; background-color: #95a5a6;">Logout</button>
        </div>
    </div>

    <script>
        let currentApiKey = '';
        let currentEmail = '';

        async function login() {
            const email = document.getElementById('email').value;
            const apiKey = document.getElementById('apiKey').value;
            const tos = document.getElementById('tos').checked;
            const errorDiv = document.getElementById('loginError');
            const loginBtn = document.getElementById('loginBtn');

            if (!email || !apiKey) {
                showError('Please enter both email and API key.');
                return;
            }
            if (!tos) {
                showError('You must agree to the Terms of Service.');
                return;
            }

            errorDiv.style.display = 'none';
            loginBtn.disabled = true;
            loginBtn.textContent = 'Loading...';

            try {
                // Check config first
                const configResponse = await fetch('/config', { headers: { 'x-api-key': apiKey } });
                if (!configResponse.ok) throw new Error('Invalid API Key');
                const config = await configResponse.json();

                // Fetch files
                const response = await fetch(`/list_files?user_email=${encodeURIComponent(email)}`, {
                    headers: { 'x-api-key': apiKey }
                });

                if (!response.ok) {
                    throw new Error('Server Error');
                }

                const data = await response.json();

                currentApiKey = apiKey;
                currentEmail = email;

                // Setup UI
                if (config.allow_upload) {
                    document.getElementById('uploadTabBtn').style.display = 'inline-block';
                }
                showFiles(data.files);

                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('mainInterface').style.display = 'block';
            } catch (err) {
                showError(err.message);
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Access Files';
            }
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));

            if (tabName === 'browse') {
                document.getElementById('browseTab').classList.add('active');
                document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
                refreshFiles();
            } else {
                document.getElementById('uploadTab').classList.add('active');
                document.getElementById('uploadTabBtn').classList.add('active');
            }
        }

        async function refreshFiles() {
            try {
                const response = await fetch(`/list_files?user_email=${encodeURIComponent(currentEmail)}`, {
                    headers: { 'x-api-key': currentApiKey }
                });
                const data = await response.json();
                showFiles(data.files);
            } catch (e) {
                console.error("Failed to refresh files", e);
            }
        }

        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const files = fileInput.files;
            const statusDiv = document.getElementById('uploadStatus');
            const uploadBtn = document.getElementById('uploadBtn');
            const progressContainer = document.getElementById('progressContainer');
            const progressBar = document.getElementById('progressBar');

            if (files.length === 0) {
                statusDiv.textContent = "Please select at least one file.";
                statusDiv.style.color = "red";
                return;
            }

            const formData = new FormData();
            for (let i = 0; i < files.length; i++) {
                formData.append('files', files[i]);
            }

            uploadBtn.disabled = true;
            uploadBtn.textContent = 'Uploading...';
            statusDiv.textContent = '';
            progressContainer.style.display = 'block';
            progressBar.style.width = '0%';
            progressBar.textContent = '0%';

            const xhr = new XMLHttpRequest();
            xhr.open('POST', '/upload', true);
            xhr.setRequestHeader('x-api-key', currentApiKey);

            xhr.upload.onprogress = function (e) {
                if (e.lengthComputable) {
                    const percentComplete = Math.round((e.loaded / e.total) * 100);
                    progressBar.style.width = percentComplete + '%';
                    progressBar.textContent = percentComplete + '%';
                }
            };

            xhr.onload = function () {
                if (xhr.status === 200) {
                    statusDiv.textContent = "Upload successful!";
                    statusDiv.style.color = "green";
                    fileInput.value = ''; // Clear input
                } else {
                    let errorMessage = 'Upload failed';
                    try {
                        const response = JSON.parse(xhr.responseText);
                        errorMessage = response.detail || errorMessage;
                    } catch (e) { }
                    statusDiv.textContent = "Error: " + errorMessage;
                    statusDiv.style.color = "red";
                }
                uploadBtn.disabled = false;
                uploadBtn.textContent = 'Upload';
            };

            xhr.onerror = function () {
                statusDiv.textContent = "Error: Network error";
                statusDiv.style.color = "red";
                uploadBtn.disabled = false;
                uploadBtn.textContent = 'Upload';
            };

            xhr.send(formData);
        }

        function showFiles(files) {
            const container = document.getElementById('filesContainer');
            container.innerHTML = '';
            document.getElementById('selectAll').checked = false;
            updateDownloadButton();

            if (files.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#7f8c8d;">No files available.</p>';
                return;
            }

            files.forEach(file => {
                const div = document.createElement('div');
                div.className = 'file-item';

                const size = formatSize(file.size);
                const downloadUrl = `/download?filename=${encodeURIComponent(file.name)}&user_email=${encodeURIComponent(currentEmail)}&api_key=${encodeURIComponent(currentApiKey)}`;

                div.innerHTML = `
                    <div style="display:flex; align-items:center;">
                        <input type="checkbox" class="file-checkbox" value="${file.name}" onchange="updateDownloadButton()" style="margin-right: 1rem;">
                        <div>
                            <strong>${file.name}</strong><br>
                            <small style="color:#7f8c8d">${size}</small>
                        </div>
                    </div>
                    <a href="${downloadUrl}" class="download-btn" target="_blank">Download</a>
                `;
                container.appendChild(div);
            });
        }

        function toggleSelectAll() {
            const selectAll = document.getElementById('selectAll');
            const checkboxes = document.querySelectorAll('.file-checkbox');
            checkboxes.forEach(cb => cb.checked = selectAll.checked);
            updateDownloadButton();
        }

        function updateDownloadButton() {
            const checkboxes = document.querySelectorAll('.file-checkbox:checked');
            const btn = document.getElementById('downloadSelectedBtn');
            btn.disabled = checkboxes.length === 0;
            btn.textContent = checkboxes.length > 0 ? `Download Selected (${checkboxes.length})` : 'Download Selected';
        }

        async function downloadSelected() {
            const checkboxes = document.querySelectorAll('.file-checkbox:checked');
            const filenames = Array.from(checkboxes).map(cb => cb.value);
            const btn = document.getElementById('downloadSelectedBtn');

            if (filenames.length === 0) return;

            btn.disabled = true;
            btn.textContent = 'Preparing Zip...';

            try {
                const response = await fetch('/download_zip', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': currentApiKey
                    },
                    body: JSON.stringify({ filenames: filenames })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.detail || 'Download failed');
                }

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'download.zip';
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                a.remove();
            } catch (err) {
                alert('Error downloading zip: ' + err.message);
            } finally {
                updateDownloadButton();
            }
        }

        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function showError(msg) {
            const el = document.getElementById('loginError');
            el.textContent = msg;
            el.style.display = 'block';
        }

        function logout() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('mainInterface').style.display = 'none';
            document.getElementById('apiKey').value = '';
            document.getElementById('tos').checked = false;
            currentApiKey = '';
            currentEmail = '';
        }
    </script>
</body>

</html>
